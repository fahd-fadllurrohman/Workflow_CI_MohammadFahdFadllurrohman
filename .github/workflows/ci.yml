name: CI - Train and Deploy (Advance)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set up job
        run: echo "Starting CI pipeline..."

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy dagshub matplotlib seaborn

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO }}.mlflow" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLproject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name("Latihan Iris Classification")
          runs = client.search_runs(
              exp.experiment_id,
              order_by=["start_time DESC"],
              max_results=1
          )
          run_id = runs[0].info.run_id
          print(f"Latest run_id: {run_id}")
          with open("latest_run_id.txt", "w") as f:
              f.write(run_id)
          PYEOF

      - name: Install Python dependencies
        run: pip install psutil prometheus-client requests

      - name: Upload to GitHub
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add latest_run_id.txt
          git diff --staged --quiet || git commit -m "ci: save latest run_id [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          RUN_ID=$(cat latest_run_id.txt)
          echo "Building Docker for run: $RUN_ID"
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "iris-classification-model" --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag iris-classification-model \
            ${{ secrets.DOCKERHUB_USERNAME }}/iris-classification-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-classification-model:latest
          echo "Docker image pushed!"

      - name: Post Log in to Docker Hub
        if: always()
        run: echo "Done"

      - name: Post Set up Python 3.12.7
        if: always()
        run: echo "Done"

      - name: Post Run actions/checkout@v3
        if: always()
        run: echo "Done"

      - name: Complete job
        run: echo "CI Pipeline selesai!"
